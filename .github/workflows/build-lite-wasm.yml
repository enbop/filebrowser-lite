name: Build Lite WASM

on:
  workflow_dispatch:
  push:
    tags:
      - "lite-v*"

permissions:
  contents: write

jobs:
  build-lite-wasm:
    name: Build filebrowser-lite WASM
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build lite frontend dist
        working-directory: frontend
        run: FILEBROWSER_LITE_WASI=1 pnpm exec vite build

      - name: Build WASM backend
        working-directory: filebrowser-lite-wasi
        run: cargo build --target=wasm32-wasip2 --release

      - name: Prepare release assets
        run: |
          cp filebrowser-lite-wasi/target/wasm32-wasip2/release/filebrowser-lite-wasi.wasm ./filebrowser-lite-wasi.wasm
          sha256sum ./filebrowser-lite-wasi.wasm > ./filebrowser-lite-wasi.wasm.sha256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: filebrowser-lite-wasm
          path: |
            filebrowser-lite-wasi.wasm
            filebrowser-lite-wasi.wasm.sha256

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/lite-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            filebrowser-lite-wasi.wasm
            filebrowser-lite-wasi.wasm.sha256